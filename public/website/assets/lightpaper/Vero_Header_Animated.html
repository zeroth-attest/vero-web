            }

            const len = Math.hypot(endX - p1.x, endY - p1.y);
            const segs = Math.max(2, Math.floor(len / 5));

            for (let i = 0; i <= segs; i++) {
                const t = i / segs;
                const px = p1.x + (endX - p1.x) * t + jitter(0.5);
                const py = p1.y + (endY - p1.y) * t + jitter(0.5);
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.stroke();

        }

        function drawMarkersForEdge(edge, p1, p2) {
            const style = edge.style;
            // Draw end marker only on the last edge of paths that HAVE a marker-end defined
            if (edge.isLastInPath && style.markerEnd) {
                const marker = markers[style.markerEnd];
                if (marker) {
                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    drawMarker(marker, p2.x, p2.y, angle, style.stroke, style.strokeWidth);
                }
            }
            // Draw start marker only on the first edge of paths that HAVE a marker-start defined
            if (edge.isFirstInPath && style.markerStart) {
                const marker = markers[style.markerStart];
                if (marker) {
                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI;
                    drawMarker(marker, p1.x, p1.y, angle, style.stroke, style.strokeWidth);
                }
            }
        }

        function applyTransform(transformStr) {
            if (!transformStr) return;
            const transforms = transformStr.match(/(\w+)\s*\(([^)]+)\)/g) || [];
            for (const t of transforms) {
                const match = t.match(/(\w+)\s*\(([^)]+)\)/);
                if (!match) continue;
                const type = match[1];
                const values = match[2].split(/[\s,]+/).map(Number);
                switch (type) {
                    case 'translate':
                        ctx.translate(values[0] || 0, values[1] || 0);
                        break;
                    case 'scale':
                        ctx.scale(values[0] || 1, values[1] !== undefined ? values[1] : values[0]);
                        break;
                    case 'rotate':
                        const ang = (values[0] || 0) * Math.PI / 180;
                        if (values.length === 3) {
                            ctx.translate(values[1], values[2]);
                            ctx.rotate(ang);
                            ctx.translate(-values[1], -values[2]);
                        } else {
                            ctx.rotate(ang);
                        }
                        break;
                }
            }
        }

        function drawMarker(marker, x, y, angle, color, lineStrokeWidth) {
            if (!marker.path) return;
            ctx.save();
            ctx.translate(x, y);
            if (marker.orient === 'auto' || marker.orient === 'auto-start-reverse') {
                ctx.rotate(angle);
            } else if (marker.orient !== '0') {
                ctx.rotate(parseFloat(marker.orient) * Math.PI / 180);
            }
            // By default markerUnits="strokeWidth", so marker size is relative to stroke-width
            const markerUnits = marker.markerUnits || 'strokeWidth';
            const unitScale = markerUnits === 'strokeWidth' ? (lineStrokeWidth || 1) : 1;
            const scaleX = (marker.width * unitScale / marker.viewBox.width) * scale;
            const scaleY = (marker.height * unitScale / marker.viewBox.height) * scale;
            ctx.scale(scaleX, scaleY);
            ctx.translate(-marker.refX, -marker.refY);
            if (marker.pathTransform) {
                applyTransform(marker.pathTransform);
            }
            ctx.beginPath();
            drawPath(marker.path);
            const markerFill = (marker.fill === 'context-stroke' || marker.fill === 'context-fill') ? color : marker.fill;
            const markerStroke = (marker.stroke === 'context-stroke' || marker.stroke === 'context-fill') ? color : marker.stroke;
            if (markerFill && markerFill !== 'none') {
                ctx.fillStyle = markerFill;
                ctx.fill();
            }
            if (markerStroke && markerStroke !== 'none') {
                ctx.strokeStyle = markerStroke;
                ctx.lineWidth = marker.strokeWidth || 1;
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawPath(d) {
            const cmds = d.match(/[mMlLhHvVzZ][^mMlLhHvVzZ]*/g) || [];
            let cx = 0, cy = 0, sx = 0, sy = 0;
            for (const cmd of cmds) {
                const t = cmd[0];
                const nums = cmd.slice(1).trim().split(/[\s,]+/).map(parseFloat).filter(n => !isNaN(n));
                switch(t) {
                    case 'M': cx = nums[0]; cy = nums[1]; sx = cx; sy = cy; ctx.moveTo(cx, cy); break;
                    case 'm': cx += nums[0]; cy += nums[1]; sx = cx; sy = cy; ctx.moveTo(cx, cy); break;
                    case 'L': cx = nums[0]; cy = nums[1]; ctx.lineTo(cx, cy); break;
                    case 'l': cx += nums[0]; cy += nums[1]; ctx.lineTo(cx, cy); break;
                    case 'H': cx = nums[0]; ctx.lineTo(cx, cy); break;
                    case 'h': cx += nums[0]; ctx.lineTo(cx, cy); break;
                    case 'V': cy = nums[0]; ctx.lineTo(cx, cy); break;
                    case 'v': cy += nums[0]; ctx.lineTo(cx, cy); break;
                    case 'Z': case 'z': ctx.closePath(); cx = sx; cy = sy; break;
                }
            }
        }

        function render(progress, alpha) {
            ctx.fillStyle = CONFIG.backgroundColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = alpha * CONFIG.opacity;

            // Use group-based rendering if we have group streams
            if (groupStreams && groupStreams.length > 0) {
                renderGroupStreams(progress);
            }
            // Use multi-stream rendering if we have multiple streams
            else if (drawStreams && drawStreams.length > 1) {
                renderMultiStream(progress);
            } else {
                renderSingleStream(progress);
            }

            ctx.globalAlpha = 1;
        }

        function renderGroupStreams(progress) {
            let totalBatchLength = 0;
            const batchLengths = [];
            for (const batch of groupStreams) {
                const batchMaxLength = Math.max(...batch.streams.map(s => s.total));
                batchLengths.push(batchMaxLength);
                totalBatchLength += batchMaxLength;
            }

            const lengthProgress = progress * totalBatchLength;
            let currentBatchIndex = 0;
            let batchStartLength = 0;

            for (let i = 0; i < batchLengths.length; i++) {
                if (lengthProgress >= batchStartLength + batchLengths[i]) {
                    batchStartLength += batchLengths[i];
                    currentBatchIndex = i + 1;
                } else {
                    currentBatchIndex = i;
                    break;
                }
            }

            for (let batchIdx = 0; batchIdx < currentBatchIndex; batchIdx++) {
                renderBatch(groupStreams[batchIdx], 1);
            }

            if (currentBatchIndex < groupStreams.length) {
                const batch = groupStreams[currentBatchIndex];
                const batchMaxLength = batchLengths[currentBatchIndex];
                const batchProgress = (lengthProgress - batchStartLength) / batchMaxLength;
                renderBatch(batch, Math.max(0, Math.min(1, batchProgress)));
            }
        }

        function renderBatch(batch, progress) {
            const maxStreamLength = Math.max(...batch.streams.map(s => s.total));
            for (const stream of batch.streams) {
                const { order, lengths, cumulative, total } = stream;
                const streamProgress = progress * maxStreamLength;
                const lengthDrawn = Math.min(streamProgress, total);

                for (let i = 0; i < order.length; i++) {
                    const edgeStart = i === 0 ? 0 : cumulative[i - 1];
                    const edgeEnd = cumulative[i];
                    const edgeLength = lengths[i];
                    let p;
                    if (lengthDrawn >= edgeEnd) p = 1;
                    else if (lengthDrawn <= edgeStart) p = 0;
                    else p = (lengthDrawn - edgeStart) / edgeLength;
                    if (p <= 0) continue;
                    const step = order[i];
                    const n1 = nodes.get(step.fromNode);
                    const n2 = nodes.get(step.toNode);
                    drawLine(n1.x, n1.y, n2.x, n2.y, step.edge.style, p);
                }

                for (let i = 0; i < order.length; i++) {
                    const edgeEnd = cumulative[i];
                    if (lengthDrawn < edgeEnd) continue;
                    const step = order[i];
                    const n1 = nodes.get(step.fromNode);
                    const n2 = nodes.get(step.toNode);
                    const p1 = toCanvas(n1.x, n1.y);
                    const p2 = toCanvas(n2.x, n2.y);
                    drawMarkersForEdge(step.edge, p1, p2);
                }
            }
        }

        function renderSingleStream(progress) {
            const total = drawOrder.length;
            const lengthDrawn = progress * totalLength;

            // Draw lines
            for (let i = 0; i < total; i++) {
                const edgeStart = i === 0 ? 0 : cumulativeLengths[i - 1];
                const edgeEnd = cumulativeLengths[i];
                const edgeLength = edgeLengths[i];

                let p;
                if (lengthDrawn >= edgeEnd) {
                    p = 1;
                } else if (lengthDrawn <= edgeStart) {
                    p = 0;
                } else {
                    p = (lengthDrawn - edgeStart) / edgeLength;
                }

                if (p <= 0) continue;

                const { fromNode, toNode, edge } = drawOrder[i];
                const n1 = nodes.get(fromNode);
                const n2 = nodes.get(toNode);
                drawLine(n1.x, n1.y, n2.x, n2.y, edge.style, p);
            }

            // Draw markers on completed segments
            for (let i = 0; i < total; i++) {
                const edgeEnd = cumulativeLengths[i];
                if (lengthDrawn < edgeEnd) continue;

                const { fromNode, toNode, edge } = drawOrder[i];
                const n1 = nodes.get(fromNode);
                const n2 = nodes.get(toNode);
                const p1 = toCanvas(n1.x, n1.y);
                const p2 = toCanvas(n2.x, n2.y);
                drawMarkersForEdge(edge, p1, p2);
            }
        }

        function renderMultiStream(progress) {
            const maxStreamLength = Math.max(...drawStreams.map(s => s.total));

            for (const stream of drawStreams) {
                const { order, lengths, cumulative, total } = stream;
                const streamProgress = progress * maxStreamLength;
                const lengthDrawn = Math.min(streamProgress, total);

                // Draw lines
                for (let i = 0; i < order.length; i++) {
                    const edgeStart = i === 0 ? 0 : cumulative[i - 1];
                    const edgeEnd = cumulative[i];
                    const edgeLength = lengths[i];

                    let p;
                    if (lengthDrawn >= edgeEnd) {
                        p = 1;
                    } else if (lengthDrawn <= edgeStart) {
                        p = 0;
                    } else {
                        p = (lengthDrawn - edgeStart) / edgeLength;
                    }

                    if (p <= 0) continue;

                    const step = order[i];
                    const n1 = nodes.get(step.fromNode);
                    const n2 = nodes.get(step.toNode);
                    drawLine(n1.x, n1.y, n2.x, n2.y, step.edge.style, p);
                }

                // Draw markers on completed segments
                for (let i = 0; i < order.length; i++) {
                    const edgeEnd = cumulative[i];
                    if (lengthDrawn < edgeEnd) continue;

                    const step = order[i];
                    const n1 = nodes.get(step.fromNode);
                    const n2 = nodes.get(step.toNode);
                    const p1 = toCanvas(n1.x, n1.y);
                    const p2 = toCanvas(n2.x, n2.y);
                    drawMarkersForEdge(step.edge, p1, p2);
                }
            }
        }

        function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
        function easeIn(t) { return t * t * t; }

        let lastCycle = -1;
        function animate(startTime) {
            const elapsed = performance.now() - startTime;
            const cycle = CONFIG.drawDuration + CONFIG.holdDuration + CONFIG.fadeDuration;
            const cycleIdx = Math.floor(elapsed / cycle);
            const t = elapsed % cycle;

            if (cycleIdx !== lastCycle) {
                lastCycle = cycleIdx;
                generateDrawOrder();
            }

            let progress, alpha;
            if (t < CONFIG.drawDuration) {
                progress = easeOut(t / CONFIG.drawDuration);
                alpha = 1;
            } else if (CONFIG.holdDuration > 0 && t < CONFIG.drawDuration + CONFIG.holdDuration) {
                progress = 1;
                alpha = 1;
            } else if (CONFIG.fadeDuration > 0) {
                progress = 1;
                alpha = 1 - easeIn((t - CONFIG.drawDuration - CONFIG.holdDuration) / CONFIG.fadeDuration);
            } else {
                progress = 1;
                alpha = 1;
            }

            render(progress, alpha);
            requestAnimationFrame(() => animate(startTime));
        }

        window.addEventListener('resize', setup);
        setup();
        generateDrawOrder();
        animate(performance.now());
    </script>
</body>
</html>
