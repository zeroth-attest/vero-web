                drawStreams = [createStream(drawOrder)];
            } else if (mode === 'both-sides') {
                generateBothSides();
            } else if (mode === 'center-out') {
                generateCenterOut();
            } else if (mode === 'edges-in') {
                generateEdgesIn();
            } else {
                generateLeftToRight();
                drawStreams = [createStream(drawOrder)];
            }
        }

        function generateGroupOrder() {
            const config = CONFIG.groupConfig;
            const mode = CONFIG.drawMode;

            const sortedGroups = [...config.groups].sort((a, b) => a.order - b.order);
            const batches = [];
            let currentBatch = [];

            for (let i = 0; i < sortedGroups.length; i++) {
                const group = sortedGroups[i];
                currentBatch.push(group);
                if (!group.drawWithNext || i === sortedGroups.length - 1) {
                    batches.push([...currentBatch]);
                    currentBatch = [];
                }
            }

            groupStreams = [];
            for (const batch of batches) {
                const batchStreams = [];
                for (const group of batch) {
                    const groupEdges = group.edgeIds.map(id => edges[id]).filter(e => e);
                    if (groupEdges.length === 0) continue;
                    const groupOrder = generateOrderForEdges(groupEdges, mode);
                    const stream = createStream(groupOrder);
                    stream.groupId = group.id;
                    stream.groupName = group.name;
                    batchStreams.push(stream);
                }
                if (batchStreams.length > 0) {
                    groupStreams.push({ streams: batchStreams, parallel: batch.length > 1 });
                }
            }

            const groupedEdgeIds = new Set(config.groups.flatMap(g => g.edgeIds));
            const ungroupedEdges = edges.filter(e => !groupedEdgeIds.has(e.id));
            if (ungroupedEdges.length > 0) {
                const ungroupedOrder = generateOrderForEdges(ungroupedEdges, mode);
                const stream = createStream(ungroupedOrder);
                stream.groupId = -1;
                stream.groupName = 'Ungrouped';
                groupStreams.push({ streams: [stream], parallel: false });
            }

            drawOrder = [];
            for (const batch of groupStreams) {
                for (const stream of batch.streams) {
                    drawOrder.push(...stream.order);
                }
            }
            calculateLengths();
        }

        function generateOrderForEdges(edgeSubset, mode) {
            edgeSubset.forEach(e => e.drawn = false);
            const order = [];

            // Group edges by original element/path index
            const pathGroups = new Map();
            for (const edge of edgeSubset) {
                const pathId = edge.elementIndex !== undefined ? edge.elementIndex : -1;
                if (!pathGroups.has(pathId)) pathGroups.set(pathId, []);
                pathGroups.get(pathId).push(edge);
            }

            // Calculate starting point for each path
            const pathInfos = [];
            for (const [pathId, pathEdges] of pathGroups) {
                let startX = Infinity, startY = -Infinity, startNodeId = null;
                for (const edge of pathEdges) {
                    const fromNode = nodes.get(edge.from);
                    const toNode = nodes.get(edge.to);
                    if (edge.isFirstInPath && fromNode) {
                        startX = fromNode.x; startY = fromNode.y; startNodeId = fromNode.id;
                        break;
                    }
                    if (fromNode && (fromNode.x < startX || (fromNode.x === startX && fromNode.y > startY))) {
                        startX = fromNode.x; startY = fromNode.y; startNodeId = fromNode.id;
                    }
                    if (toNode && (toNode.x < startX || (toNode.x === startX && toNode.y > startY))) {
                        startX = toNode.x; startY = toNode.y; startNodeId = toNode.id;
                    }
                }
                pathInfos.push({ pathId, edges: pathEdges, startX, startY, startNodeId });
            }

            // Sort paths by starting position
            if (mode === 'right-to-left') {
                pathInfos.sort((a, b) => {
                    const xDiff = b.startX - a.startX;
                    if (Math.abs(xDiff) > 0.5) return xDiff;
                    return a.startY - b.startY;
                });
            } else {
                pathInfos.sort((a, b) => {
                    const xDiff = a.startX - b.startX;
                    if (Math.abs(xDiff) > 0.5) return xDiff;
                    return b.startY - a.startY;
                });
            }

            // Draw each path completely
            for (const pathInfo of pathInfos) {
                const pathEdges = pathInfo.edges;
                const pathEdgeSet = new Set(pathEdges.map(e => e.id));

                const walkPath = (nodeId, fromEdgeId) => {
                    const node = nodes.get(nodeId);
                    if (!node) return;
                    const available = node.edges.map(id => edges[id]).filter(e => pathEdgeSet.has(e.id) && !e.drawn && e.id !== fromEdgeId);
                    if (available.length === 0) return;
                    const withDir = available.map(edge => {
                        const otherId = edge.from === nodeId ? edge.to : edge.from;
                        const other = nodes.get(otherId);
                        return { edge, otherId, otherX: other ? other.x : 0, otherY: other ? other.y : 0 };
                    });
                    if (mode === 'right-to-left') {
                        withDir.sort((a, b) => {
                            const xDiff = a.otherX - b.otherX;
                            if (Math.abs(xDiff) > 2) return xDiff;
                            return b.otherY - a.otherY;
                        });
                    } else {
                        withDir.sort((a, b) => {
                            const xDiff = b.otherX - a.otherX;
                            if (Math.abs(xDiff) > 2) return xDiff;
                            return a.otherY - b.otherY;
                        });
                    }
                    for (const { edge, otherId } of withDir) {
                        if (edge.drawn) continue;
                        edge.drawn = true;
                        // Always draw in original direction (from → to)
                        order.push({ fromNode: edge.from, toNode: edge.to, edge });
                        walkPath(otherId, edge.id);
                    }
                };

                while (pathEdges.some(e => !e.drawn)) {
                    let bestNode = null;
                    let bestX = mode === 'right-to-left' ? -Infinity : Infinity;
                    let bestY = mode === 'right-to-left' ? Infinity : -Infinity;
                    for (const edge of pathEdges) {
                        if (edge.drawn) continue;
                        for (const node of [nodes.get(edge.from), nodes.get(edge.to)]) {
                            if (!node) continue;
                            const hasUndrawn = node.edges.some(eId => pathEdgeSet.has(eId) && !edges[eId].drawn);
                            if (!hasUndrawn) continue;
                            if (mode === 'right-to-left') {
                                if (node.x > bestX || (node.x === bestX && node.y < bestY)) {
                                    bestX = node.x; bestY = node.y; bestNode = node;
                                }
                            } else {
                                if (node.x < bestX || (node.x === bestX && node.y > bestY)) {
                                    bestX = node.x; bestY = node.y; bestNode = node;
                                }
                            }
                        }
                    }
                    if (!bestNode) break;
                    walkPath(bestNode.id, null);
                }
            }
            return order;
        }

        function generateLeftToRight() {
            drawOrder = generateOrderForEdges([...edges], 'left-to-right');
            calculateLengths();
        }

        function generateRightToLeft() {
            drawOrder = generateOrderForEdges([...edges], 'right-to-left');
            calculateLengths();
        }

        function generateBothSides() {
            edges.forEach(e => e.drawn = false);
            const leftOrder = [];
            while (edges.some(e => !e.drawn)) {
                const startNode = findBottomLeftUndrawnNode();
                if (!startNode) break;
                walkPathLeftToRightCollect(startNode.id, null, leftOrder);
            }

            const lengths = leftOrder.map(step => {
                const n1 = nodes.get(step.fromNode);
                const n2 = nodes.get(step.toNode);
                return Math.hypot(n2.x - n1.x, n2.y - n1.y);
            });
            const totalLen = lengths.reduce((a, b) => a + b, 0);
            const halfLen = totalLen / 2;

            let cumLen = 0;
            let splitIndex = 0;
            for (let i = 0; i < lengths.length; i++) {
                cumLen += lengths[i];
                if (cumLen >= halfLen) {
                    splitIndex = i + 1;
                    break;
                }
            }

            const leftHalf = leftOrder.slice(0, splitIndex);
            const rightHalf = leftOrder.slice(splitIndex).reverse();

            drawStreams = [createStream(leftHalf), createStream(rightHalf)];
            drawOrder = leftOrder;
            calculateLengths();
        }

        function generateCenterOut() {
            let minX = Infinity, maxX = -Infinity;
            for (const [id, node] of nodes) {
                minX = Math.min(minX, node.x);
                maxX = Math.max(maxX, node.x);
            }
            const centerX = (minX + maxX) / 2;

            edges.forEach(e => e.drawn = false);
            const fullOrder = [];
            while (edges.some(e => !e.drawn)) {
                const startNode = findBottomLeftUndrawnNode();
                if (!startNode) break;
                walkPathLeftToRightCollect(startNode.id, null, fullOrder);
            }

            const leftOfCenter = [];
            const rightOfCenter = [];

            for (const step of fullOrder) {
                const n1 = nodes.get(step.fromNode);
                const n2 = nodes.get(step.toNode);
                const midX = (n1.x + n2.x) / 2;
                if (midX < centerX) {
                    leftOfCenter.push(step);
                } else {
                    rightOfCenter.push(step);
                }
            }

            leftOfCenter.reverse();

            drawStreams = [createStream(leftOfCenter), createStream(rightOfCenter)];
            drawOrder = fullOrder;
            calculateLengths();
        }

        function generateEdgesIn() {
            let minX = Infinity, maxX = -Infinity;
            for (const [id, node] of nodes) {
                minX = Math.min(minX, node.x);
                maxX = Math.max(maxX, node.x);
            }
            const centerX = (minX + maxX) / 2;

            edges.forEach(e => e.drawn = false);
            const fullOrder = [];
            while (edges.some(e => !e.drawn)) {
                const startNode = findBottomLeftUndrawnNode();
                if (!startNode) break;
                walkPathLeftToRightCollect(startNode.id, null, fullOrder);
            }

            const leftOfCenter = [];
            const rightOfCenter = [];

            for (const step of fullOrder) {
                const n1 = nodes.get(step.fromNode);
                const n2 = nodes.get(step.toNode);
                const midX = (n1.x + n2.x) / 2;
                if (midX < centerX) {
                    leftOfCenter.push(step);
                } else {
                    rightOfCenter.push(step);
                }
            }

            rightOfCenter.reverse();

            drawStreams = [createStream(leftOfCenter), createStream(rightOfCenter)];
            drawOrder = fullOrder;
            calculateLengths();
        }

        function createStream(order) {
            const lengths = [];
            const cumulative = [];
            let total = 0;

            for (const step of order) {
                const n1 = nodes.get(step.fromNode);
                const n2 = nodes.get(step.toNode);
                const len = Math.hypot(n2.x - n1.x, n2.y - n1.y);
                lengths.push(len);
                total += len;
                cumulative.push(total);
            }

            return { order, lengths, cumulative, total };
        }

        function calculateLengths() {
            edgeLengths = [];
            cumulativeLengths = [];
            let cumulative = 0;

            for (const step of drawOrder) {
                const n1 = nodes.get(step.fromNode);
                const n2 = nodes.get(step.toNode);
                const length = Math.hypot(n2.x - n1.x, n2.y - n1.y);
                edgeLengths.push(length);
                cumulative += length;
                cumulativeLengths.push(cumulative);
            }
            totalLength = cumulative;
        }

        function findBottomLeftUndrawnNode() {
            const nodesWithUndrawn = [];
            for (const [id, node] of nodes) {
                if (node.edges.some(eId => !edges[eId].drawn)) {
                    nodesWithUndrawn.push(node);
                }
            }
            if (nodesWithUndrawn.length === 0) return null;
            nodesWithUndrawn.sort((a, b) => {
                const xDiff = a.x - b.x;
                if (Math.abs(xDiff) > 0.5) return xDiff;
                return b.y - a.y;
            });
            return nodesWithUndrawn[0];
        }

        function findTopRightUndrawnNode() {
            const nodesWithUndrawn = [];
            for (const [id, node] of nodes) {
                if (node.edges.some(eId => !edges[eId].drawn)) {
                    nodesWithUndrawn.push(node);
                }
            }
            if (nodesWithUndrawn.length === 0) return null;
            nodesWithUndrawn.sort((a, b) => {
                const xDiff = b.x - a.x;
                if (Math.abs(xDiff) > 0.5) return xDiff;
                return a.y - b.y;
            });
            return nodesWithUndrawn[0];
        }

        function walkPathLeftToRight(nodeId, fromEdgeId) {
            const node = nodes.get(nodeId);
            if (!node) return;

            const available = node.edges
                .map(id => edges[id])
                .filter(e => !e.drawn && e.id !== fromEdgeId);

            if (available.length === 0) return;

            const withDir = available.map(edge => {
                const otherId = edge.from === nodeId ? edge.to : edge.from;
                const other = nodes.get(otherId);
                return { edge, otherId, otherX: other ? other.x : 0, otherY: other ? other.y : 0 };
            });

            withDir.sort((a, b) => {
                const xDiff = b.otherX - a.otherX;
                if (Math.abs(xDiff) > 2) return xDiff;
                const yDiff = a.otherY - b.otherY;
                if (Math.abs(yDiff) > 2) return yDiff;
                return 0;
            });

            for (const { edge, otherId } of withDir) {
                if (edge.drawn) continue;
                edge.drawn = true;
                // Always draw in original direction (from → to)
                drawOrder.push({ fromNode: edge.from, toNode: edge.to, edge });
                walkPathLeftToRight(otherId, edge.id);
            }
        }

        function walkPathRightToLeft(nodeId, fromEdgeId) {
            const node = nodes.get(nodeId);
            if (!node) return;

            const available = node.edges
                .map(id => edges[id])
                .filter(e => !e.drawn && e.id !== fromEdgeId);

            if (available.length === 0) return;

            const withDir = available.map(edge => {
                const otherId = edge.from === nodeId ? edge.to : edge.from;
                const other = nodes.get(otherId);
                return { edge, otherId, otherX: other ? other.x : 0, otherY: other ? other.y : 0 };
            });

            withDir.sort((a, b) => {
                const xDiff = a.otherX - b.otherX;
                if (Math.abs(xDiff) > 2) return xDiff;
                const yDiff = b.otherY - a.otherY;
                if (Math.abs(yDiff) > 2) return yDiff;
                return 0;
            });

            for (const { edge, otherId } of withDir) {
                if (edge.drawn) continue;
                edge.drawn = true;
                // Always draw in original direction (from → to)
                drawOrder.push({ fromNode: edge.from, toNode: edge.to, edge });
                walkPathRightToLeft(otherId, edge.id);
            }
        }

        function walkPathLeftToRightCollect(nodeId, fromEdgeId, collection) {
            const node = nodes.get(nodeId);
            if (!node) return;

            const available = node.edges
                .map(id => edges[id])
                .filter(e => !e.drawn && e.id !== fromEdgeId);

            if (available.length === 0) return;

            const withDir = available.map(edge => {
                const otherId = edge.from === nodeId ? edge.to : edge.from;
                const other = nodes.get(otherId);
                return { edge, otherId, otherX: other ? other.x : 0, otherY: other ? other.y : 0 };
            });

            withDir.sort((a, b) => {
                const xDiff = b.otherX - a.otherX;
                if (Math.abs(xDiff) > 2) return xDiff;
                const yDiff = a.otherY - b.otherY;
                if (Math.abs(yDiff) > 2) return yDiff;
                return 0;
            });

            for (const { edge, otherId } of withDir) {
                if (edge.drawn) continue;
                edge.drawn = true;
                // Always draw in original direction (from → to)
                collection.push({ fromNode: edge.from, toNode: edge.to, edge });
                walkPathLeftToRightCollect(otherId, edge.id, collection);
            }
        }

        function toCanvas(x, y) {
            return { x: x * scale + offsetX, y: y * scale + offsetY };
        }

        function jitter(amt) {
            return (Math.random() - 0.5) * amt * CONFIG.jitter;
        }

        function drawLine(x1, y1, x2, y2, style, progress) {
            const p1 = toCanvas(x1, y1);
            const p2 = toCanvas(x2, y2);
            const endX = p1.x + (p2.x - p1.x) * progress;
            const endY = p1.y + (p2.y - p1.y) * progress;

            ctx.beginPath();
            ctx.strokeStyle = style.stroke;
            ctx.lineWidth = Math.max(0.5, style.strokeWidth * scale * 0.8);
            ctx.lineCap = style.lineCap || 'round';
            ctx.lineJoin = style.lineJoin || 'round';

            // Handle dash array
            if (style.dashArray && style.dashArray.length > 0) {
                ctx.setLineDash(style.dashArray.map(d => d * scale));
            } else {
                ctx.setLineDash([]);
            }

            const len = Math.hypot(endX - p1.x, endY - p1.y);
            const segs = Math.max(2, Math.floor(len / 5));

            for (let i = 0; i <= segs; i++) {
                const t = i / segs;
                const px = p1.x + (endX - p1.x) * t + jitter(0.5);
                const py = p1.y + (endY - p1.y) * t + jitter(0.5);
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.stroke();

        }

        function drawMarkersForEdge(edge, p1, p2) {
            const style = edge.style;
            // Draw end marker only on the last edge of paths that HAVE a marker-end defined
            if (edge.isLastInPath && style.markerEnd) {
                const marker = markers[style.markerEnd];
                if (marker) {
                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    drawMarker(marker, p2.x, p2.y, angle, style.stroke, style.strokeWidth);
                }
            }
            // Draw start marker only on the first edge of paths that HAVE a marker-start defined
            if (edge.isFirstInPath && style.markerStart) {
                const marker = markers[style.markerStart];
                if (marker) {
                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI;
                    drawMarker(marker, p1.x, p1.y, angle, style.stroke, style.strokeWidth);
                }
            }
        }

        function applyTransform(transformStr) {
            if (!transformStr) return;
            const transforms = transformStr.match(/(\w+)\s*\(([^)]+)\)/g) || [];
            for (const t of transforms) {
                const match = t.match(/(\w+)\s*\(([^)]+)\)/);
                if (!match) continue;
                const type = match[1];
                const values = match[2].split(/[\s,]+/).map(Number);
                switch (type) {
                    case 'translate':
                        ctx.translate(values[0] || 0, values[1] || 0);
                        break;
                    case 'scale':
                        ctx.scale(values[0] || 1, values[1] !== undefined ? values[1] : values[0]);
                        break;
                    case 'rotate':
                        const ang = (values[0] || 0) * Math.PI / 180;
                        if (values.length === 3) {
                            ctx.translate(values[1], values[2]);
                            ctx.rotate(ang);
                            ctx.translate(-values[1], -values[2]);
                        } else {
                            ctx.rotate(ang);
                        }
                        break;
                }
            }
        }

        function drawMarker(marker, x, y, angle, color, lineStrokeWidth) {
            if (!marker.path) return;
            ctx.save();
            ctx.translate(x, y);
            if (marker.orient === 'auto' || marker.orient === 'auto-start-reverse') {
                ctx.rotate(angle);
            } else if (marker.orient !== '0') {
                ctx.rotate(parseFloat(marker.orient) * Math.PI / 180);
            }
            // By default markerUnits="strokeWidth", so marker size is relative to stroke-width
            const markerUnits = marker.markerUnits || 'strokeWidth';
            const unitScale = markerUnits === 'strokeWidth' ? (lineStrokeWidth || 1) : 1;
            const scaleX = (marker.width * unitScale / marker.viewBox.width) * scale;
            const scaleY = (marker.height * unitScale / marker.viewBox.height) * scale;
            ctx.scale(scaleX, scaleY);
            ctx.translate(-marker.refX, -marker.refY);
            if (marker.pathTransform) {
                applyTransform(marker.pathTransform);
            }
            ctx.beginPath();
            drawPath(marker.path);
            const markerFill = (marker.fill === 'context-stroke' || marker.fill === 'context-fill') ? color : marker.fill;
            const markerStroke = (marker.stroke === 'context-stroke' || marker.stroke === 'context-fill') ? color : marker.stroke;
            if (markerFill && markerFill !== 'none') {
                ctx.fillStyle = markerFill;
                ctx.fill();
            }
            if (markerStroke && markerStroke !== 'none') {
                ctx.strokeStyle = markerStroke;
                ctx.lineWidth = marker.strokeWidth || 1;
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawPath(d) {
            const cmds = d.match(/[mMlLhHvVzZ][^mMlLhHvVzZ]*/g) || [];
            let cx = 0, cy = 0, sx = 0, sy = 0;
            for (const cmd of cmds) {
                const t = cmd[0];
                const nums = cmd.slice(1).trim().split(/[\s,]+/).map(parseFloat).filter(n => !isNaN(n));
                switch(t) {
                    case 'M': cx = nums[0]; cy = nums[1]; sx = cx; sy = cy; ctx.moveTo(cx, cy); break;
                    case 'm': cx += nums[0]; cy += nums[1]; sx = cx; sy = cy; ctx.moveTo(cx, cy); break;
                    case 'L': cx = nums[0]; cy = nums[1]; ctx.lineTo(cx, cy); break;
                    case 'l': cx += nums[0]; cy += nums[1]; ctx.lineTo(cx, cy); break;
                    case 'H': cx = nums[0]; ctx.lineTo(cx, cy); break;
                    case 'h': cx += nums[0]; ctx.lineTo(cx, cy); break;
                    case 'V': cy = nums[0]; ctx.lineTo(cx, cy); break;
                    case 'v': cy += nums[0]; ctx.lineTo(cx, cy); break;
                    case 'Z': case 'z': ctx.closePath(); cx = sx; cy = sy; break;
                }
            }
        }

        function render(progress, alpha) {
            ctx.fillStyle = CONFIG.backgroundColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = alpha * CONFIG.opacity;

            // Use group-based rendering if we have group streams
            if (groupStreams && groupStreams.length > 0) {
                renderGroupStreams(progress);
            }
            // Use multi-stream rendering if we have multiple streams
            else if (drawStreams && drawStreams.length > 1) {
                renderMultiStream(progress);
            } else {
                renderSingleStream(progress);
            }

            ctx.globalAlpha = 1;
        }

        function renderGroupStreams(progress) {
            let totalBatchLength = 0;
            const batchLengths = [];
            for (const batch of groupStreams) {
                const batchMaxLength = Math.max(...batch.streams.map(s => s.total));
                batchLengths.push(batchMaxLength);
                totalBatchLength += batchMaxLength;
            }

            const lengthProgress = progress * totalBatchLength;
            let currentBatchIndex = 0;
            let batchStartLength = 0;

            for (let i = 0; i < batchLengths.length; i++) {
                if (lengthProgress >= batchStartLength + batchLengths[i]) {
                    batchStartLength += batchLengths[i];
                    currentBatchIndex = i + 1;
                } else {
                    currentBatchIndex = i;
                    break;
                }
            }

            for (let batchIdx = 0; batchIdx < currentBatchIndex; batchIdx++) {
                renderBatch(groupStreams[batchIdx], 1);
            }

            if (currentBatchIndex < groupStreams.length) {
                const batch = groupStreams[currentBatchIndex];
                const batchMaxLength = batchLengths[currentBatchIndex];
                const batchProgress = (lengthProgress - batchStartLength) / batchMaxLength;
                renderBatch(batch, Math.max(0, Math.min(1, batchProgress)));
            }
        }

        function renderBatch(batch, progress) {
            const maxStreamLength = Math.max(...batch.streams.map(s => s.total));
            for (const stream of batch.streams) {
                const { order, lengths, cumulative, total } = stream;
                const streamProgress = progress * maxStreamLength;
                const lengthDrawn = Math.min(streamProgress, total);

                for (let i = 0; i < order.length; i++) {
                    const edgeStart = i === 0 ? 0 : cumulative[i - 1];
                    const edgeEnd = cumulative[i];
                    const edgeLength = lengths[i];
                    let p;
                    if (lengthDrawn >= edgeEnd) p = 1;
                    else if (lengthDrawn <= edgeStart) p = 0;
                    else p = (lengthDrawn - edgeStart) / edgeLength;
                    if (p <= 0) continue;
                    const step = order[i];
                    const n1 = nodes.get(step.fromNode);
                    const n2 = nodes.get(step.toNode);
                    drawLine(n1.x, n1.y, n2.x, n2.y, step.edge.style, p);
                }

                for (let i = 0; i < order.length; i++) {
                    const edgeEnd = cumulative[i];
                    if (lengthDrawn < edgeEnd) continue;
                    const step = order[i];
                    const n1 = nodes.get(step.fromNode);
                    const n2 = nodes.get(step.toNode);
                    const p1 = toCanvas(n1.x, n1.y);
                    const p2 = toCanvas(n2.x, n2.y);
                    drawMarkersForEdge(step.edge, p1, p2);
                }
            }
        }

        function renderSingleStream(progress) {
            const total = drawOrder.length;
            const lengthDrawn = progress * totalLength;

            // Draw lines
            for (let i = 0; i < total; i++) {
                const edgeStart = i === 0 ? 0 : cumulativeLengths[i - 1];
                const edgeEnd = cumulativeLengths[i];
                const edgeLength = edgeLengths[i];

                let p;
                if (lengthDrawn >= edgeEnd) {
                    p = 1;
                } else if (lengthDrawn <= edgeStart) {
                    p = 0;
                } else {
                    p = (lengthDrawn - edgeStart) / edgeLength;
                }

                if (p <= 0) continue;

                const { fromNode, toNode, edge } = drawOrder[i];
                const n1 = nodes.get(fromNode);
                const n2 = nodes.get(toNode);
                drawLine(n1.x, n1.y, n2.x, n2.y, edge.style, p);
            }

            // Draw markers on completed segments
            for (let i = 0; i < total; i++) {
                const edgeEnd = cumulativeLengths[i];
                if (lengthDrawn < edgeEnd) continue;

                const { fromNode, toNode, edge } = drawOrder[i];
                const n1 = nodes.get(fromNode);
                const n2 = nodes.get(toNode);
                const p1 = toCanvas(n1.x, n1.y);
                const p2 = toCanvas(n2.x, n2.y);
                drawMarkersForEdge(edge, p1, p2);
            }
        }

        function renderMultiStream(progress) {
            const maxStreamLength = Math.max(...drawStreams.map(s => s.total));

            for (const stream of drawStreams) {
                const { order, lengths, cumulative, total } = stream;
                const streamProgress = progress * maxStreamLength;
                const lengthDrawn = Math.min(streamProgress, total);

                // Draw lines
                for (let i = 0; i < order.length; i++) {
                    const edgeStart = i === 0 ? 0 : cumulative[i - 1];
                    const edgeEnd = cumulative[i];
                    const edgeLength = lengths[i];

                    let p;
                    if (lengthDrawn >= edgeEnd) {
                        p = 1;
                    } else if (lengthDrawn <= edgeStart) {
                        p = 0;
                    } else {
                        p = (lengthDrawn - edgeStart) / edgeLength;
                    }

                    if (p <= 0) continue;

                    const step = order[i];
                    const n1 = nodes.get(step.fromNode);
                    const n2 = nodes.get(step.toNode);
                    drawLine(n1.x, n1.y, n2.x, n2.y, step.edge.style, p);
                }

                // Draw markers on completed segments
                for (let i = 0; i < order.length; i++) {
                    const edgeEnd = cumulative[i];
                    if (lengthDrawn < edgeEnd) continue;

                    const step = order[i];
                    const n1 = nodes.get(step.fromNode);
                    const n2 = nodes.get(step.toNode);
                    const p1 = toCanvas(n1.x, n1.y);
                    const p2 = toCanvas(n2.x, n2.y);
                    drawMarkersForEdge(step.edge, p1, p2);
                }
            }
        }

        function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
        function easeIn(t) { return t * t * t; }

        let lastCycle = -1;
        function animate(startTime) {
            const elapsed = performance.now() - startTime;
            const cycle = CONFIG.drawDuration + CONFIG.holdDuration + CONFIG.fadeDuration;
            const cycleIdx = Math.floor(elapsed / cycle);
            const t = elapsed % cycle;

            if (cycleIdx !== lastCycle) {
                lastCycle = cycleIdx;
                generateDrawOrder();
            }

            let progress, alpha;
            if (t < CONFIG.drawDuration) {
                progress = easeOut(t / CONFIG.drawDuration);
                alpha = 1;
            } else if (t < CONFIG.drawDuration + CONFIG.holdDuration) {
                progress = 1;
                alpha = 1;
            } else {
                progress = 1;
                alpha = 1 - easeIn((t - CONFIG.drawDuration - CONFIG.holdDuration) / CONFIG.fadeDuration);
            }

            render(progress, alpha);
            requestAnimationFrame(() => animate(startTime));
        }

        window.addEventListener('resize', setup);
        setup();
        generateDrawOrder();
        animate(performance.now());
    </script>
</body>
